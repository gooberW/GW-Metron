<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BP Metronome</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/icons.css">
    <link rel="stylesheet" href="css/fonts.css">

</head>
<body>
    <div class="navbar">
        <div class="row">
            <div class="setting-btn">
                <div id="settings-btn" class="icon icon-settings"></div>
            </div>
            <div id="time-sig-dropdown" class="time-sig">
                <p class="time-sig-text">4/4</p>
            </div>
            <div id="accent-toggle" class="accent-toggle off">
                <p id="accent-toggle-text">Accent Off</p>
            </div>
        </div>
        <div class="row">
            <p class="logo">Metron</p>
        </div>
        <div class="row win-btns">
            <div class="minimize-btn">
                <div class="icon icon-minimize"></div>
            </div>
            <div class="close-btn">
                <div class="icon icon-x"></div>
            </div>
        </div>
    </div>
    <div class="main">
        <div class="metronome-container">
            <div class="row">
                <div class="col">
                    <p class="bpm">BPM</p>
                    <p id="tempo" class="tempo">120</p>
                </div>
            </div>
        
            <div id="time-dots-container" class="row circle-row">
                <!-- here the number of circles will be dynamic, based off of time signature -->
                <div class="circle"></div>
                <div class="circle"></div>
                <div class="circle"></div>
                <div class="circle"></div>
            </div>
            <div class="row btn-row">
                <div class="play-btn">
                    <div class="icon icon-play"></div>
                </div>
                <div class="tap-btn">
                    <p>TAP</p>
                </div>
            </div>

            <div class="bpm-scrollbar">
                <input type="range" min="20" max="300" value="120" 
                                    class="bpm-slider" id="bpm-range">
                
                <div class="row">
                    <span class="min-tempo">20</span>
                    <span class="max-tempo">300</span>
                </div>
            </div>
        </div>
        <div class="sound-stuff">
            <p class="title">Sound</p>

            <div class="row">
                <div class="sound-btn active">Click</div>
                <div class="sound-btn">Beep</div>
                <div class="sound-btn">Wood</div>
                <div class="sound-btn">Custom</div>
            </div>
        </div>
    </div>

    
    
</body>

<script src="renderer.js"></script>
</html>
